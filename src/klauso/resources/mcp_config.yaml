# Klauso default MCP servers (seeded to workspace config/ when missing).
# Add more stdio servers under `servers:` as needed.

servers:
  - name: filesystem
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-filesystem", "."]

  - name: github
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-github"]
