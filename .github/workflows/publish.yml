# Publish to PyPI using Trusted Publishing (OIDC).
# Configure at https://pypi.org/manage/project/klauso/settings/publishing/
#   Publisher: GitHub
#   Repository: OWNER/THIS-REPO
#   Workflow: publish.yml
#   Environment name: pypi (optional; must match below)
#
# First-time project: you may need one manual `twine upload` or PyPI UI to create the project.

name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/klauso/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install -U pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
